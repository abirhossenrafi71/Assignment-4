<!DOCTYPE html>
<html lang="en" data-theme="lofi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <!-- Tailwind CSS & Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Theme  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <!-- Font -->


    <style>
        *{
            background-color: #F8FAFC;
        }
    </style>

</head>

<body class="mx-auto w-full  md:max-w-[1440px] lg:w-full p-5 space-y-3">
    <header class="">
        <h1 class="text-4xl font-bold text-[#002C5C]">Job Application Tracker</h1>
        <div class="stats-container mt-5 grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-3 gap-3">
            <div class="stats shadow">
                <div class="stat w-full h-[100px]">
                    <div class="stat-title text-xl text-gray-800">Total</div>
                    <div class="stat-value text-[#002C5C]">8</div>
                </div>
            </div>
            <div class="stats shadow">
                <div class="stat w-full h-[100px]">
                    <div class="stat-title text-xl text-gray-800">Interview</div>
                    <div class="stat-value text-green-500">0</div>
                </div>
            </div>
            <div class="stats shadow">
                <div class="stat w-full h-[100px]">
                    <div class="stat-title text-xl text-gray-800">Rejected</div>
                    <div class="stat-value text-error">0</div>
                </div>
            </div>
        </div>
        <hr class="mt-7 text-gray-200">
    </header>
    <section>
        <div class="flex justify-between">
            <h3 class="font-bold text-2xl">Available Jobs</h3>
            <p class="stat-title text-xl">8 jobs</p>
        </div>
        <div>
            <button class="bg-primary">All</button>
        </div>
    </section>
</body>

</html>
